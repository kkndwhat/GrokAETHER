name: AETHER Daily News Update

on:
  schedule:
    # Run every 6 hours
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  update-news:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # Needed for pushing commits

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run news updater
        run: node scripts/update-news.js

      - name: Commit and push if changed
        run: |
          git config user.name "AETHER Bot"
          git config user.email "aether@bot.local"

          git add data/news.json

          if git diff --staged --quiet; then
            echo "No new signals to commit"
          else
            git commit -m "chore: update news feed [$(date -u +'%Y-%m-%d %H:%M UTC')]"
            git push
            echo "✅ News feed updated and pushed"
          fi

      - name: Summary
        if: always()
        run: |
          echo "=== AETHER News Update Summary ==="
          echo "Time: $(date -u)"
          echo "Articles in data/news.json:"
          cat data/news.json | jq '.count // "N/A"' 2>/dev/null || echo "Could not read count"
